<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Register - Create Account</title>
<style>
  * {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
  }

  html, body {
    width: 100%;
    height: 100%;
    overflow: hidden;
  }

  body {
    font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
    background: linear-gradient(135deg, #1e2d50 0%, #1a2847 40%, #16233d 100%);
    width: 100vw;
    height: 100vh;
    position: relative;
    display: flex;
    align-items: center;
    justify-content: flex-start;
    padding: 0 80px;
  }


  /* ═══════════════════════════════════════════════════════════
     DECORATIVE CIRCLES - Background
  ════════════════════════════════════════════════════════════ */
  .circle {
    position: absolute;
    border-radius: 50%;
    pointer-events: none;
  }

  /* Top-left overlapping circles */
  .circle-1 {
    top: -60px;
    left: -80px;
    width: 240px;
    height: 240px;
    background: radial-gradient(circle at 35% 35%, 
      rgba(100, 110, 140, 0.35), 
      rgba(70, 80, 110, 0.12));
  }

  .circle-2 {
    top: -40px;
    left: 60px;
    width: 200px;
    height: 200px;
    background: radial-gradient(circle at 30% 30%, 
      rgba(90, 100, 130, 0.32), 
      rgba(60, 70, 100, 0.1));
  }

  /* ═══════════════════════════════════════════════════════════
     SCATTERED STARS
  ════════════════════════════════════════════════════════════ */
  .star {
    position: absolute;
    color: #4a5a7a;
    opacity: 0.4;
    pointer-events: none;
    user-select: none;
  }

  .s1 { top: 22%;  left: 15%;  font-size: 11px; opacity: 0.35; }
  .s2 { top: 42%;  left: 12%;  font-size: 9px;  opacity: 0.3;  }
  .s3 { bottom: 24%; left: 20%; font-size: 12px; opacity: 0.35; }

  /* ═══════════════════════════════════════════════════════════
     LEFT SIDE - ROBOT CHARACTER
  ════════════════════════════════════════════════════════════ */
  .left-side {
    position: relative;
    z-index: 2;
    display: flex;
    align-items: center;
    justify-content: flex-start;
    flex: 1;
    max-width: 500px;
  }

  .robot-image {
    width: 100%;
    max-width: 420px;
    height: auto;
    /* REPLACE: White/cyan robot character holding tablet */
  }

  /* ═══════════════════════════════════════════════════════════
     RIGHT SIDE - REGISTRATION FORM
  ════════════════════════════════════════════════════════════ */
  .right-side {
    position: relative;
    z-index: 2;
    flex: 1;
    display: flex;
    align-items: center;
    justify-content: center;
    max-width: 550px;
  }

  .form-card {
    width: 100%;
    max-width: 450px;
    background: #e8e4dc;
    border-radius: 24px;
    padding: 50px 45px;
    box-shadow: 0 8px 32px rgba(0, 0, 0, 0.3);
  }

  .form-title {
    font-size: 32px;
    font-weight: 700;
    color: #2a2535;
    text-align: center;
    margin-bottom: 45px;
    letter-spacing: 0.5px;
    text-shadow: 2px 2px 0px rgba(255, 255, 255, 0.6);
  }

  /* Form fields */
  .form-group {
    display: flex;
    align-items: center;
    gap: 20px;
    margin-bottom: 28px;
  }

  .form-label {
    font-size: 15px;
    font-weight: 600;
    color: #2a2535;
    min-width: 140px;
    text-align: left;
  }

  .form-input {
    flex: 1;
    height: 38px;
    background: #a8a0a8;
    border: none;
    border-radius: 8px;
    padding: 0 14px;
    font-size: 14px;
    color: #2a2535;
    font-family: 'Segoe UI', sans-serif;
  }

  .form-input::placeholder {
    color: #5a5560;
  }

  .form-input:focus {
    outline: none;
    background: #b0a8b0;
  }

  /* Submit button */
  .submit-container {
    display: flex;
    justify-content: flex-end;
    margin-top: 45px;
  }

  .submit-btn {
    padding: 10px 32px;
    background: #7a7aaa;
    border: none;
    border-radius: 8px;
    font-size: 16px;
    font-weight: 600;
    color: #ffffff;
    cursor: pointer;
    letter-spacing: 0.5px;
    box-shadow: 0 3px 12px rgba(100, 100, 150, 0.3);
    transition: background 0.2s ease, transform 0.1s ease, box-shadow 0.2s ease;
  }

  .submit-btn:hover {
    background: #8a8aba;
    transform: translateY(-2px);
    box-shadow: 0 5px 16px rgba(100, 100, 150, 0.4);
  }

  .submit-btn:active {
    transform: translateY(0);
    box-shadow: 0 2px 8px rgba(100, 100, 150, 0.25);
  }

  /* ═══════════════════════════════════════════════════════════
     RESPONSIVE
  ════════════════════════════════════════════════════════════ */
  @media (max-width: 1200px) {
    body {
      padding: 0 50px;
      flex-direction: column;
      justify-content: center;
      gap: 40px;
    }
    .left-side {
      max-width: 350px;
    }
    .robot-image {
      max-width: 320px;
    }
  }

  @media (max-width: 768px) {
    body {
      padding: 30px 20px;
    }
    .form-card {
      padding: 40px 30px;
    }
    .form-group {
      flex-direction: column;
      align-items: flex-start;
      gap: 8px;
    }
    .form-label {
      min-width: auto;
    }
    .form-input {
      width: 100%;
    }
  }
</style>
</head>
<body>



  <!-- Decorative Background Circles -->
  <div class="circle circle-1"></div>
  <div class="circle circle-2"></div>

  <!-- Scattered Stars -->
  <span class="star s1">✦</span>
  <span class="star s2">✦</span>
  <span class="star s3">✦</span>

  <!-- Left Side: Robot Character -->
  <div class="left-side">
    <!-- REPLACE: White/cyan robot character holding tablet -->
    <img src="../static/images/robot.png" 
         alt="Robot Character" 
         class="robot-image">
  </div>

  <!-- Right Side: Registration Form -->
  <div class="right-side">
    <div class="form-card">
      <h2 class="form-title">Create new account</h2>

      <form action="/go_to_scan" method="POST">
        <!-- Name Field -->
        <div class="form-group">
          <label class="form-label">Enter your name :</label>
          <input type="text" name="full_name" class="form-input" placeholder="" required>
        </div>

        <!-- Phone Number Field -->
        <div class="form-group">
          <label class="form-label">Phone number :</label>
          <input type="tel" name="phone" class="form-input" placeholder="">
        </div>

        <!-- Address Field -->
        <div class="form-group">
          <label class="form-label">Address :</label>
          <input type="text" name="address" class="form-input" placeholder="">
        </div>

        <!-- E mail Field -->
        <div class="form-group">
          <label class="form-label">Email :</label>
          <input type="email" name="email" class="form-input" placeholder="" required>
        </div>

        <!-- User ID Field -->
        <div class="form-group">
          <label class="form-label">User ID :</label>
          <input type="text" name="user_id" class="form-input" placeholder="" required>
        </div>

        <!-- Submit Button -->
        <div class="submit-container">
          <button type="submit" class="submit-btn">Next →</button>
        </div>
      </form>
    </div>
  </div>

</body>
</html>
