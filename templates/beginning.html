<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>InfoSphere - Welcome</title>
    <style>
        /* 1. Basic Reset & Background */
        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            background-color: #030a1e; /* Deep space navy */
            font-family: 'Arial', sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        /* 2. Starry Background Animation */
        .stars-container {
            position: absolute;
            width: 100%;
            height: 100%;
            z-index: 0;
        }

        .star {
            position: absolute;
            color: #5d6d8a;
            font-size: 14px;
            opacity: 0.6;
            animation: twinkle 3s infinite ease-in-out;
        }

        @keyframes twinkle {
            0%, 100% { opacity: 0.3; transform: scale(1); }
            50% { opacity: 1; transform: scale(1.2); }
        }

        /* 3. The Moon & Nebula Shape */
        .moon {
            position: absolute;
            right: 10%;
            top: 60%;
            width: 80px;
            height: 80px;
            background: #1a2540;
            border-radius: 50%;
            box-shadow: 15px 15px 0 0 #283556 inset;
            opacity: 0.6;
        }

        .nebula {
            position: absolute;
            top: 15%;
            left: 20%;
            width: 120px;
            height: 120px;
            background: rgba(45, 55, 90, 0.3);
            filter: blur(40px);
            border-radius: 40% 60% 70% 30% / 40% 50% 60% 50%;
        }

        /* 4. Main Content */
        .content {
            position: relative;
            z-index: 10;
            text-align: center;
        }

        .logo {
    font-size: 72px;
    font-weight: bold;
    letter-spacing: 8px;
    color: #4a8df8;
    text-transform: uppercase;
    margin-bottom: 20px;
    background: repeating-linear-gradient(
        #4a8df8, 
        #4a8df8 2px, 
        #030a1e 2px, 
        #030a1e 4px
    );
    /* Add these three lines to fix the error */
    -webkit-background-clip: text;
    background-clip: text; 
    -webkit-text-fill-color: transparent;
}

        .tagline {
            color: #ffffff;
            font-style: italic;
            font-size: 18px;
            letter-spacing: 2px;
            margin-top: 40px;
            opacity: 0.9;
        }

        /* Make it clickable to enter the app */
        .enter-link {
            text-decoration: none;
            cursor: pointer;
        }
    </style>
</head>
<body>

    <div class="stars-container">
        <div class="nebula"></div>
        <div class="star" style="top: 10%; left: 13%;">★</div>
        <div class="star" style="top: 25%; left: 68%;">★</div>
        <div class="star" style="top: 65%; left: 54%;">★</div>
        <div class="star" style="top: 85%; left: 28%;">★</div>
        <div class="star" style="top: 92%; left: 81%;">★</div>
        <div class="moon"></div>
    </div>

  <a href="{{ url_for('welcome') }}" class="enter-link">
    <div class="content">
        <h1 class="logo">InfoSphere</h1>
        <p class="tagline">Centering the world's wisdom</p>
    </div>
</a>

</body>
</html>
