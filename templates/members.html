<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Member Management - FLMS</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #0a0e1a 0%, #0f1530 100%);
            color: #ffffff;
            min-height: 100vh;
            padding: 40px;
        }

        .header-row {
            display: flex;
            align-items: center;
            gap: 20px;
            margin-bottom: 40px;
        }

        .home-icon-btn {
            width: 50px;
            height: 50px;
            background: #1a2245;
            border: 1px solid #00d97e;
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            text-decoration: none;
            font-size: 24px;
            transition: all 0.3s ease;
        }

        .home-icon-btn:hover {
            background: #00d97e;
            transform: scale(1.05);
        }

        .table-container {
            background: rgba(26, 34, 69, 0.7);
            border-radius: 20px;
            padding: 20px;
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        table {
            width: 100%;
            border-collapse: collapse;
        }

        th {
            text-align: left;
            padding: 15px;
            color: #00d97e;
            border-bottom: 2px solid #2a345e;
        }

        td {
            padding: 15px;
            border-bottom: 1px solid #2a345e;
        }

        .delete-btn {
            background: #ff4d4d;
            color: white;
            border: none;
            padding: 8px 12px;
            border-radius: 6px;
            cursor: pointer;
        }
    </style>
</head>
<body>

    <div class="header-row">
        <a href="/home" class="home-icon-btn">🏠</a>
        <h1>Registered Member Directory</h1>
    </div>

    <div class="table-container">
        <table>
            <thead>
                <tr>
                    <th>User ID</th>
                    <th>Full Name</th>
                    <th>Email</th>
                    <th>Phone</th>
                    <th>Actions</th>
                </tr>
            </thead>
            <tbody>
                {% for member in members %}
                <tr>
                    <td><strong>{{ member.user_id_code }}</strong></td>
                    <td>{{ member.full_name }}</td>
                    <td>{{ member.email }}</td>
                    <td>{{ member.phone }}</td>
                    <td>
                        <button class="delete-btn" data-id="{{ member.id }}" onclick="confirmDelete(this)">
                            Delete
                        </button>
                    </td>
                </tr>
                {% endfor %}
            </tbody>
        </table>
    </div>

    <script>
        function confirmDelete(btn) {
            // Get the ID from the data attribute instead of passing it in the function
            const memberId = btn.getAttribute('data-id');

            if (confirm("Are you sure?")) {
                fetch('/delete_member/' + memberId, {
                    method: 'POST'
                })
                .then(response => response.json())
                .then(data => {
                    if (data.status === 'success') {
                        const row = btn.closest('tr');
                        row.style.opacity = '0';
                        setTimeout(() => row.remove(), 300);
                    } else {
                        alert("Error: " + data.message);
                    }
                })
                .catch(error => {
                    console.error('Error:', error);
                    alert("Failed to delete.");
                });
            }
        }
    </script>
</body>
</html>
