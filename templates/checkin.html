<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Checkin - Accessibility</title>
<style>
  * {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
  }

  html, body {
    width: 100%;
    height: 100%;
    overflow: hidden;
  }

  body {
    font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
    background: linear-gradient(135deg, #0a0e1a 0%, #0f1530 30%, #141c3a 60%, #1a2245 100%);
    width: 100vw;
    height: 100vh;
    position: relative;
    display: flex;
    align-items: center;
    justify-content: center;
  }



  /* ───── Scattered stars ───── */
  .star {
    position: absolute;
    color: #3a4a7a;
    opacity: 0.5;
    pointer-events: none;
    user-select: none;
  }

  .s1  { top: 8%;   left: 10%;  font-size: 12px; opacity: 0.4;  }
  .s2  { top: 18%;  left: 26%;  font-size: 9px;  opacity: 0.3;  }
  .s3  { top: 12%;  right: 18%; font-size: 11px; opacity: 0.35; }
  .s4  { top: 42%;  left: 8%;   font-size: 10px; opacity: 0.3;  }
  .s5  { top: 58%;  left: 24%;  font-size: 9px;  opacity: 0.25; }
  .s6  { bottom: 22%; left: 12%; font-size: 11px; opacity: 0.3; }
  .s7  { bottom: 10%; left: 38%; font-size: 10px; opacity: 0.35; }
  .s8  { top: 38%;  right: 14%; font-size: 10px; opacity: 0.3;  }
  .s9  { bottom: 28%; right: 10%; font-size: 12px; opacity: 0.25; }
  .s10 { bottom: 15%; right: 28%; font-size: 9px;  opacity: 0.3;  }

  /* ───── Main card container ───── */
  .card {
    position: relative;
    width: 800px;
    background: #e8eaf0;
    border-radius: 32px;
    padding: 42px 48px 48px 48px;
    box-shadow: 0 8px 32px rgba(0, 0, 0, 0.3);
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 28px;
  }

  /* Title */
  .card-title {
    font-size: 20px;
    font-weight: 700;
    color: #1a1f3a;
    letter-spacing: 0.3px;
  }

  /* Camera / scan preview area */
  .preview-box {
    width: 100%;
    height: 350px;
    background: #c5c9d2;
    border-radius: 12px;
  }

  /* User ID section */
  .user-id-row {
    width: 100%;
    display: flex;
    align-items: center;
    gap: 12px;
  }

  .user-id-label {
    font-size: 15px;
    font-weight: 600;
    color: #2a2f4a;
    white-space: nowrap;
  }

  .user-id-input {
    flex: 1;
    height: 32px;
    background: #bfc3cc;
    border: none;
    border-radius: 6px;
    padding: 0 12px;
    font-size: 14px;
    color: #3a3f5a;
  }

  /* Button row */
  .button-row {
    width: 100%;
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 16px;
    margin-top: 8px;
  }

  .btn {
    flex: 1;
    height: 42px;
    border: none;
    border-radius: 10px;
    font-size: 15px;
    font-weight: 600;
    cursor: pointer;
    transition: transform 0.12s ease, box-shadow 0.18s ease;
  }

  .btn-invalid {
    background: #a8acb8;
    color: #4a4f62;
    box-shadow: 0 2px 8px rgba(0, 0, 0, 0.1);
  }

  .btn-invalid:hover {
    background: #9ca0ac;
    transform: translateY(-1px);
    box-shadow: 0 3px 12px rgba(0, 0, 0, 0.15);
  }

  .btn-valid {
    background: #00d97e;
    color: #ffffff;
    box-shadow: 0 3px 12px rgba(0, 217, 126, 0.35);
  }

  .btn-valid:hover {
    background: #00c571;
    transform: translateY(-1px);
    box-shadow: 0 4px 16px rgba(0, 217, 126, 0.45);
  }

  .btn:active {
    transform: translateY(0);
  }

  .user-id-row {
  width: 100%;
  display: flex;
  align-items: center; /* Keeps everything vertically centered */
  gap: 10px;
}

.user-id-input {
  flex: 1; /* This makes the input take up the remaining space */
  height: 32px;
}


  #video {
  width: 100%;
  height: 100%;
  object-fit: cover; /* This makes the camera fill the box */
  border-radius: 12px;
}

#canvas {
  position: absolute;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  pointer-events: none; /* Add this to allow clicks to pass through to the button */
}
</style>
</head>
<body>


  <!-- Stars scattered across the background -->
  <span class="star s1">✦</span>
  <span class="star s2">✦</span>
  <span class="star s3">✦</span>
  <span class="star s4">✦</span>
  <span class="star s5">✦</span>
  <span class="star s6">✦</span>
  <span class="star s7">✦</span>
  <span class="star s8">✦</span>
  <span class="star s9">✦</span>
  <span class="star s10">✦</span>

  <!-- Main card -->
  <div class="card">
    <h2 class="card-title">Checking Accessibility</h2>

    <!-- Camera preview / scan area -->
    <div class="preview-box" id="preview-container">
      <video id="video" autoplay playsinline muted></video>
      <canvas id="canvas"></canvas>
    </div>
    <!-- User ID field -->
   <div class="user-id-row">
  <span class="user-id-label">User ID -</span>
  <input type="text" id="userIdInput" class="user-id-input" placeholder="Scanning ID..." readonly />
  <button id="scanBtn" type="button" class="btn" style="flex: 0 0 120px; height: 32px; font-size: 13px; background: #3a4a7a; color: white; margin-left: 10px;">
    Scan Face
  </button>
</div>

    <!-- Invalid / Valid buttons -->
    <div class="button-row">
      <button class="btn btn-invalid">Invalid</button>
      <button class="btn btn-valid">Valid</button>
    </div>
  </div>

<script>
document.addEventListener('DOMContentLoaded', () => {
    const video = document.getElementById('video');
    const userIdInput = document.getElementById('userIdInput');
    const scanBtn = document.getElementById('scanBtn');
    const validBtn = document.querySelector('.btn-valid');

    // 1. Initial State
    validBtn.disabled = true;
    validBtn.style.opacity = "0.5";

    // 2. Start the Webcam
    if (navigator.mediaDevices && navigator.mediaDevices.getUserMedia) {
        navigator.mediaDevices.getUserMedia({ video: true })
            .then(stream => { 
                video.srcObject = stream; 
            })
            .catch(err => { 
                console.error("Camera error:", err);
                alert("Please allow camera access.");
            });
    }

    // 3. The Scan Action
    scanBtn.addEventListener('click', function() {
        console.log("Scan button clicked!"); // Check your browser console (F12) for this
        
        // Visual feedback
        scanBtn.innerText = "Scanning...";
        scanBtn.style.background = "#5a6a9a";

        // Capture frame
        const canvas = document.createElement('canvas');
        canvas.width = video.videoWidth;
        canvas.height = video.videoHeight;
        const ctx = canvas.getContext('2d');
        ctx.drawImage(video, 0, 0, canvas.width, canvas.height);

        const imageData = canvas.toDataURL('image/jpeg');

        // Send to Flask
        fetch('/verify_face', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ image: imageData })
        })
        .then(res => res.json())
        .then(data => {
            if (data.status === "success") {
                userIdInput.value = data.user_id;
                validBtn.disabled = false;
                validBtn.style.opacity = "1";
                scanBtn.innerText = "Match!";
                scanBtn.style.background = "#00d97e";
            } else {
                alert("Face not recognized. Ensure you are registered.");
                scanBtn.innerText = "Scan Face";
                scanBtn.style.background = "#3a4a7a";
            }
        })
        .catch(err => {
            console.error("Fetch error:", err);
            scanBtn.innerText = "Error";
            alert("Could not connect to the server.");
        });
    });

    // 4. Final Login
    validBtn.addEventListener('click', () => {
        window.location.href = "/home";
    });
});
</script>

</body>
</html>
